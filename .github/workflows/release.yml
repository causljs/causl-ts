name: release

# Tag-triggered publish to npmjs.com (https://registry.npmjs.org/) for
# every non-private @causl/* package in the workspace.
#
# Trigger: push of an annotated tag matching `v*.*.*` (e.g. `v0.3.0`).
# Manual trigger via workflow_dispatch is also available for re-runs.
#
# Auth: npm OIDC "trusted publishing" — NO npm token.
#  Each @causl/* package has a trusted publisher on npmjs pointing at
#  (causljs/causl-ts, release.yml), so the job mints a short-lived
#  credential from the GitHub OIDC id-token at publish time. There is no
#  NPM_TOKEN in this workflow, and provenance attestations are produced.
#
#  OIDC only engages when NO token is present — that is why there is no
#  NODE_AUTH_TOKEN below. If a token were set, the tools would use it and
#  skip OIDC.
#
# Requirements (all in place):
#  - A trusted publisher configured per package on npmjs
#    (package → Settings/Access → Trusted Publisher → GitHub Actions:
#     organization `causljs`, repository `causl-ts`, workflow `release.yml`,
#     allowed action `npm publish`).
#  - `id-token: write` permission (granted below).
#  - pnpm >= 10.12 (OIDC support; repo pins 10.33.2 via packageManager) and
#    npm >= 11.5.1 in the runner (ensured by the upgrade step).
#
# Rollback: the org-level `NPM_TOKEN` secret is retained. If an OIDC publish
# ever fails, re-add `env: { NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} }` to
# the publish step to fall back to token auth.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Publish with --dry-run (no tarballs uploaded)'
        required: false
        default: 'false'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @causl/* to npmjs.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm OIDC trusted publishing: lets the job request the
      # GitHub OIDC id-token that npm exchanges for a short-lived publish
      # credential. Also what --provenance signs against.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from package.json's `packageManager` field
        # to avoid ERR_PNPM_BAD_PM_VERSION when the two diverge.
        uses: pnpm/action-setup@v4

      - name: Setup Node 22 (with npmjs.com registry)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@causl'
          cache: 'pnpm'

      - name: Ensure npm >= 11.5.1 (OIDC trusted publishing)
        # Node 22 still bundles npm 10.x, which predates OIDC trusted
        # publishing. Upgrade so the OIDC token exchange is available.
        run: npm install -g npm@latest && npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter './packages/**' run build

      # `pnpm publish -r` walks every workspace package, honours each
      # package.json's `private: true` (skips them), and rewrites
      # `workspace:*` ranges to literal versions on publish (which is why
      # this stays on pnpm — `npm publish` cannot parse `workspace:*`).
      # `--provenance` records a build-provenance attestation (needs
      # id-token: write). `--no-git-checks` skips the "working tree clean"
      # gate. `--access public` is required the first time a scoped package
      # is published. No NODE_AUTH_TOKEN: auth is via OIDC trusted publishing.
      - name: Publish (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: pnpm -r --filter './packages/**' publish --access public --no-git-checks --provenance --dry-run

      - name: Publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true') }}
        run: pnpm -r --filter './packages/**' publish --access public --no-git-checks --provenance
